<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>클릭 게임</title>

  <style>
    /* 전체 페이지 기본 설정 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box; /* 패딩이 너비에 포함되도록 설정 */
    }

    body {
      /* 화면 전체를 세로로 가운데 정렬 */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    /* 게임 카드 박스 */
    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px 40px;
      width: 360px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    /* 제목 */
    .title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    /* 부제목 */
    .subtitle {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 32px;
    }

    /* 점수/시간 정보 박스 */
    .info-box {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 16px;
      padding: 20px 32px;
      margin-bottom: 36px;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .label {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.45);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* 점수·시간 숫자 */
    .value {
      font-size: 2.4rem;
      font-weight: 800;
      color: #e0e0ff;
      line-height: 1;
    }

    .unit {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
    }

    /* 세로 구분선 */
    .divider {
      width: 1px;
      height: 48px;
      background: rgba(255, 255, 255, 0.15);
    }

    /* 클릭 버튼 */
    .click-btn {
      width: 100%;
      padding: 20px;
      font-size: 1.3rem;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #6c63ff, #48cfad);
      color: white;
      letter-spacing: 0.5px;
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      box-shadow: 0 8px 24px rgba(108, 99, 255, 0.4);
    }

    /* 버튼을 누를 때 살짝 눌리는 효과 */
    .click-btn:active {
      transform: scale(0.96);
      box-shadow: 0 4px 12px rgba(108, 99, 255, 0.3);
    }

    /* 게임이 끝나면 버튼을 비활성화해 흐리게 표시 */
    .click-btn:disabled {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.3);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* 결과 박스 (기본적으로 숨겨져 있음) */
    .result-box {
      display: none; /* JavaScript에서 'block'으로 바꿔 보여줌 */
      margin-top: 28px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 16px;
      animation: fadeIn 0.4s ease;
    }

    /* 결과 박스가 나타날 때 부드럽게 등장 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .result-score {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 20px;
    }

    /* 최종 점수 숫자 강조 */
    .result-score span {
      font-size: 1.5rem;
      font-weight: 800;
      color: #48cfad;
    }

    /* 다시 시작 버튼 */
    .restart-btn {
      padding: 12px 28px;
      font-size: 0.95rem;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }

    .restart-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>

  <!-- 게임 전체를 감싸는 컨테이너 -->
  <div class="container">

    <!-- 게임 제목 -->
    <h1 class="title">⚡ 클릭 게임</h1>
    <p class="subtitle">10초 안에 최대한 많이 클릭하세요!</p>

    <!-- 점수와 남은 시간을 나란히 표시 -->
    <div class="info-box">
      <div class="info-item">
        <span class="label">점수</span>
        <!-- id="score"를 통해 JavaScript에서 이 숫자를 바꿉니다 -->
        <span class="value" id="score">0</span>
      </div>
      <div class="divider"></div>
      <div class="info-item">
        <span class="label">남은 시간</span>
        <!-- id="timer"를 통해 카운트다운 숫자를 표시합니다 -->
        <span class="value" id="timer">10</span>
        <span class="unit">초</span>
      </div>
    </div>

    <!-- 클릭 버튼 / id="clickBtn"으로 JavaScript에서 클릭 이벤트를 감지합니다 -->
    <button id="clickBtn" class="click-btn">
      👆 클릭!
    </button>

    <!-- 게임이 끝나면 이 영역에 결과를 보여줍니다 (처음엔 숨겨져 있음) -->
    <div class="result-box" id="resultBox">
      <p class="result-title">🎉 게임 종료!</p>
      <p class="result-score">최종 점수: <span id="finalScore">0</span>점</p>
      <!-- 다시 시작 버튼 -->
      <button id="restartBtn" class="restart-btn">🔄 다시 시작</button>
    </div>

  </div>

  <script>
    // ─────────────────────────────────────────
    // 1. HTML 요소 가져오기
    //    document.getElementById()로 HTML의 id와 연결합니다.
    // ─────────────────────────────────────────
    const scoreEl    = document.getElementById('score');      // 점수 표시 영역
    const timerEl    = document.getElementById('timer');      // 타이머 표시 영역
    const clickBtn   = document.getElementById('clickBtn');   // 클릭 버튼
    const resultBox  = document.getElementById('resultBox');  // 결과 박스
    const finalScore = document.getElementById('finalScore'); // 최종 점수 텍스트
    const restartBtn = document.getElementById('restartBtn'); // 다시 시작 버튼

    // ─────────────────────────────────────────
    // 2. 게임 상태 변수
    // ─────────────────────────────────────────
    let score    = 0;     // 현재 점수 (클릭할 때마다 1씩 늘어남)
    let timeLeft = 10;    // 남은 시간 (초 단위, 10에서 시작)
    let timer    = null;  // setInterval의 반환값을 저장해 나중에 멈출 때 사용

    // ─────────────────────────────────────────
    // 3. 게임 시작 함수
    //    변수를 초기값으로 되돌리고 타이머를 시작합니다.
    // ─────────────────────────────────────────
    function startGame() {
      // 변수 초기화
      score    = 0;
      timeLeft = 10;

      // 화면에 초기값 반영
      scoreEl.textContent = score;
      timerEl.textContent = timeLeft;

      // 결과 박스 숨기고 클릭 버튼 다시 활성화
      resultBox.style.display = 'none';
      clickBtn.disabled = false;

      // setInterval: 1000ms(1초)마다 countdown 함수를 반복 호출
      timer = setInterval(countdown, 1000);
    }

    // ─────────────────────────────────────────
    // 4. 카운트다운 함수
    //    1초마다 호출되어 남은 시간을 1씩 줄입니다.
    // ─────────────────────────────────────────
    function countdown() {
      timeLeft--;                       // 남은 시간 1 감소
      timerEl.textContent = timeLeft;   // 화면에 업데이트

      // 남은 시간이 0이 되면 게임 종료
      if (timeLeft <= 0) {
        endGame();
      }
    }

    // ─────────────────────────────────────────
    // 5. 게임 종료 함수
    //    타이머를 멈추고 최종 결과를 보여줍니다.
    // ─────────────────────────────────────────
    function endGame() {
      clearInterval(timer);         // 반복 타이머 정지
      clickBtn.disabled = true;     // 버튼 비활성화 (더 이상 클릭 불가)

      finalScore.textContent      = score;   // 최종 점수 표시
      resultBox.style.display     = 'block'; // 결과 박스 보이기
    }

    // ─────────────────────────────────────────
    // 6. 이벤트 리스너 등록
    //    버튼을 클릭하면 실행할 함수를 연결합니다.
    // ─────────────────────────────────────────

    // 클릭 버튼: 누를 때마다 점수 +1
    clickBtn.addEventListener('click', function () {
      score++;                        // 점수 1 증가
      scoreEl.textContent = score;    // 화면에 반영
    });

    // 다시 시작 버튼: 게임을 처음부터 다시 시작
    restartBtn.addEventListener('click', function () {
      startGame();
    });

    // ─────────────────────────────────────────
    // 7. 페이지가 열리면 자동으로 게임 시작
    // ─────────────────────────────────────────
    startGame();
  </script>
</body>
</html>
